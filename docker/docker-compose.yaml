# CareerStatic 服務組態：app（爬蟲 + 排程 + 儀表板）與 PostgreSQL。
name: careerstatic

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: careerstatic-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Taipei
      DATABASE_URL: postgresql+psycopg://careerstatic:careerstatic@db:5432/careerstatic
      RUN_ON_STARTUP: "true"
    volumes:
      # 只掛載 logs；原始碼不掛載，image 自足（改碼後需 ./run.sh build）
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: careerstatic
      POSTGRES_PASSWORD: careerstatic
      POSTGRES_DB: careerstatic
      TZ: Asia/Taipei
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerstatic -d careerstatic"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  pgdata:
